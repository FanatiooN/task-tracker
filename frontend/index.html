<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #f5f5f5; color: #333; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { margin-bottom: 20px; }
    h2 { margin-bottom: 12px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; color: #666; }

    .section { background: #fff; border: 1px solid #ddd; padding: 16px; margin-bottom: 16px; }
    .hidden { display: none; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    input, select, textarea { padding: 6px 10px; border: 1px solid #ccc; font-family: monospace; font-size: 13px; }
    input { width: 200px; }
    textarea { width: 100%; height: 60px; resize: vertical; }
    button { padding: 6px 14px; border: 1px solid #333; background: #333; color: #fff; cursor: pointer; font-family: monospace; font-size: 13px; }
    button:hover { background: #555; }
    button.secondary { background: #fff; color: #333; }
    button.secondary:hover { background: #eee; }
    button.danger { background: #c00; border-color: #c00; }
    button.danger:hover { background: #e00; }
    button.google { background: #4285f4; border-color: #4285f4; }
    button.google:hover { background: #357ae8; }

    #status-bar { background: #333; color: #fff; padding: 8px 16px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
    #status-bar span { opacity: 0.7; }

    .response { margin-top: 10px; background: #f9f9f9; border: 1px solid #eee; padding: 10px; font-size: 12px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
    .response.error { border-color: #f99; background: #fff5f5; color: #c00; }
    .response.ok { border-color: #9f9; background: #f5fff5; }

    .tabs { display: flex; gap: 0; margin-bottom: 16px; }
    .tab { padding: 8px 16px; border: 1px solid #ddd; cursor: pointer; background: #f5f5f5; font-family: monospace; font-size: 13px; }
    .tab.active { background: #fff; border-bottom-color: #fff; font-weight: bold; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #eee; }
    th { background: #f5f5f5; font-weight: bold; }
    .task-status { padding: 2px 6px; border-radius: 2px; font-size: 11px; }
    .task-status.TODO { background: #eee; }
    .task-status.IN_PROGRESS { background: #fff3cd; }
    .task-status.DONE { background: #d4edda; }
  </style>
</head>
<body>

<div id="status-bar">
  <span>Task Tracker API</span>
  <span id="auth-info">Not logged in</span>
</div>

<div class="container">
  <h1>Task Tracker</h1>

  <!-- AUTH SECTION -->
  <div id="auth-section" class="section">
    <h2>Auth</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <div id="tab-login">
      <div class="row">
        <input id="login-email" type="email" placeholder="email">
        <input id="login-password" type="password" placeholder="password">
        <button onclick="login()">Login</button>
        <button class="google" onclick="loginGoogle()">Login with Google</button>
      </div>
      <div id="telegram-widget" style="margin-top:8px"></div>
      <div id="login-response" class="response hidden"></div>
    </div>

    <div id="tab-register" class="hidden">
      <div class="row">
        <input id="reg-name" placeholder="name">
        <input id="reg-email" type="email" placeholder="email">
        <input id="reg-password" type="password" placeholder="password">
        <button onclick="register()">Register</button>
      </div>
      <div id="register-response" class="response hidden"></div>
    </div>
  </div>

  <!-- LOGGED IN SECTIONS -->
  <div id="app-section" class="hidden">

    <div class="section">
      <h2>Session</h2>
      <div class="row">
        <button class="secondary" onclick="refreshToken()">Refresh Token</button>
        <button class="danger" onclick="logout()">Logout</button>
      </div>
      <div id="session-response" class="response hidden"></div>
    </div>

    <!-- USER SECTION -->
    <div class="section">
      <h2>User</h2>
      <div class="row">
        <input id="user-id" placeholder="user id">
        <button class="secondary" onclick="getUser()">GET</button>
      </div>
      <div class="row">
        <input id="update-name" placeholder="new name">
        <input id="update-email" placeholder="new email">
        <button class="secondary" onclick="updateUser()">PUT</button>
        <button class="danger" onclick="deleteUser()">DELETE</button>
      </div>
      <div id="user-response" class="response hidden"></div>
    </div>

    <!-- TASKS SECTION -->
    <div class="section">
      <h2>Tasks</h2>

      <div class="row">
        <strong style="align-self:center;font-size:13px;">Create</strong>
      </div>
      <div class="row">
        <input id="task-title" placeholder="title" style="width:250px">
        <input id="task-desc" placeholder="description (optional)" style="width:250px">
        <button onclick="createTask()">POST /tasks</button>
      </div>
      <div id="create-task-response" class="response hidden"></div>

      <hr style="margin:12px 0;border:none;border-top:1px solid #eee">

      <div class="row">
        <strong style="align-self:center;font-size:13px;">List</strong>
      </div>
      <div class="row">
        <select id="list-status">
          <option value="">any status</option>
          <option value="TASK_STATUS_TODO">TODO</option>
          <option value="TASK_STATUS_IN_PROGRESS">IN_PROGRESS</option>
          <option value="TASK_STATUS_DONE">DONE</option>
        </select>
        <input id="list-page-size" placeholder="page size" style="width:100px" value="20">
        <input id="list-page-token" placeholder="page token" style="width:200px">
        <button class="secondary" onclick="listTasks()">GET /tasks</button>
      </div>
      <div id="list-tasks-response" class="response hidden"></div>
      <div id="tasks-table" class="hidden" style="margin-top:12px">
        <table>
          <thead><tr><th>ID</th><th>Title</th><th>Description</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="tasks-tbody"></tbody>
        </table>
        <div style="margin-top:8px;font-size:12px;color:#666">
          Next page token: <span id="next-page-token">—</span>
        </div>
      </div>

      <hr style="margin:12px 0;border:none;border-top:1px solid #eee">

      <div class="row">
        <strong style="align-self:center;font-size:13px;">Get / Update / Delete</strong>
      </div>
      <div class="row">
        <input id="task-id" placeholder="task id" style="width:300px">
        <button class="secondary" onclick="getTask()">GET</button>
      </div>
      <div class="row">
        <input id="update-task-title" placeholder="new title" style="width:180px">
        <input id="update-task-desc" placeholder="new description" style="width:180px">
        <select id="update-task-status">
          <option value="">no change</option>
          <option value="TASK_STATUS_TODO">TODO</option>
          <option value="TASK_STATUS_IN_PROGRESS">IN_PROGRESS</option>
          <option value="TASK_STATUS_DONE">DONE</option>
        </select>
        <button class="secondary" onclick="updateTask()">PUT</button>
        <button class="danger" onclick="deleteTask()">DELETE</button>
      </div>
      <div id="task-response" class="response hidden"></div>
    </div>

  </div>
</div>

<script>
  const API = ''

  let accessToken = localStorage.getItem('access_token') || ''
  let refreshTokenVal = localStorage.getItem('refresh_token') || ''
  let currentUserID = localStorage.getItem('user_id') || ''

  // Init
  window.addEventListener('load', () => {
    initTelegramWidget()
    if (accessToken) showApp()

    // Handle Google OAuth callback
    const params = new URLSearchParams(window.location.search)
    if (params.has('access_token')) {
      setTokens(params.get('access_token'), params.get('refresh_token'))
      window.history.replaceState({}, '', '/')
    }
  })

  function setTokens(access, refresh, userID) {
    accessToken = access
    refreshTokenVal = refresh
    localStorage.setItem('access_token', access)
    localStorage.setItem('refresh_token', refresh)
    if (!userID) userID = JSON.parse(atob(access.split('.')[1])).UserID
    if (userID) {
      currentUserID = userID
      localStorage.setItem('user_id', userID)
    }
    showApp()
  }

  function showApp() {
    document.getElementById('auth-section').classList.add('hidden')
    document.getElementById('app-section').classList.remove('hidden')
    document.getElementById('auth-info').textContent = `Logged in | user: ${currentUserID || '?'}`
    if (currentUserID) document.getElementById('user-id').value = currentUserID
  }

  function showAuth() {
    document.getElementById('auth-section').classList.remove('hidden')
    document.getElementById('app-section').classList.add('hidden')
    document.getElementById('auth-info').textContent = 'Not logged in'
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (tab === 'login' ? 0 : 1)))
    document.getElementById('tab-login').classList.toggle('hidden', tab !== 'login')
    document.getElementById('tab-register').classList.toggle('hidden', tab !== 'register')
  }

  async function request(method, path, body, responseEl) {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json' },
    }
    if (accessToken) opts.headers['Authorization'] = `Bearer ${accessToken}`
    if (body) opts.body = JSON.stringify(body)

    try {
      const res = await fetch(API + path, opts)
      const text = await res.text()
      let data
      try { data = JSON.parse(text) } catch { data = text }

      if (responseEl) {
        const el = document.getElementById(responseEl)
        el.classList.remove('hidden', 'ok', 'error')
        el.classList.add(res.ok ? 'ok' : 'error')
        el.textContent = JSON.stringify(data, null, 2)
      }
      return { ok: res.ok, data }
    } catch (e) {
      if (responseEl) {
        const el = document.getElementById(responseEl)
        el.classList.remove('hidden', 'ok')
        el.classList.add('error')
        el.textContent = e.message
      }
      return { ok: false, data: null }
    }
  }

  // AUTH
  async function login() {
    const r = await request('POST', '/login', {
      email: document.getElementById('login-email').value,
      password: document.getElementById('login-password').value,
    }, 'login-response')
    if (r.ok) setTokens(r.data.access_token, r.data.refresh_token)
  }

  async function register() {
    const r = await request('POST', '/register', {
      name: document.getElementById('reg-name').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-password').value,
    }, 'register-response')
    if (r.ok) setTokens(r.data.access_token, r.data.refresh_token)
  }

  function loginGoogle() {
    window.location.href = API + '/login/google'
  }

  function initTelegramWidget() {
    const container = document.getElementById('telegram-widget')

    const btn = document.createElement('button')
    btn.className = 'tg-auth-button'
    btn.textContent = 'Log in with Telegram'
    container.appendChild(btn)

    const script = document.createElement('script')
    script.src = 'https://telegram.org/js/telegram-login.js'
    script.setAttribute('data-client-id', '8995212014')
    script.setAttribute('data-onauth', 'onTelegramAuth(data)')
    script.setAttribute('data-request-access', 'write')
    script.async = true
    container.appendChild(script)
  }

  async function onTelegramAuth(data) {
    if (!data.id_token) {
      console.error('No id_token in Telegram response', data)
      return
    }

    const r = await request('POST', '/login/telegram', { id_token: data.id_token }, 'login-response')
    if (r.ok) setTokens(r.data.access_token, r.data.refresh_token)
  }

  window.onTelegramAuth = onTelegramAuth

  async function refreshToken() {
    const r = await request('POST', '/refresh', { refresh_token: refreshTokenVal }, 'session-response')
    if (r.ok) setTokens(r.data.access_token, r.data.refresh_token)
  }

  async function logout() {
    await request('POST', '/logout', { refresh_token: refreshTokenVal }, 'session-response')
    accessToken = ''
    refreshTokenVal = ''
    currentUserID = ''
    localStorage.clear()
    showAuth()
  }

  // USERS
  async function getUser() {
    const id = document.getElementById('user-id').value
    await request('GET', `/users/${id}`, null, 'user-response')
  }

  async function updateUser() {
    const id = document.getElementById('user-id').value
    const body = {}
    const name = document.getElementById('update-name').value
    const email = document.getElementById('update-email').value
    if (name) body.name = name
    if (email) body.email = email
    await request('PUT', `/users/${id}`, body, 'user-response')
  }

  async function deleteUser() {
    const id = document.getElementById('user-id').value
    await request('DELETE', `/users/${id}`, null, 'user-response')
  }

  // TASKS
  async function createTask() {
    const body = { title: document.getElementById('task-title').value }
    const desc = document.getElementById('task-desc').value
    if (desc) body.description = desc
    await request('POST', '/tasks', body, 'create-task-response')
  }

  async function listTasks() {
    const status = document.getElementById('list-status').value
    const size = document.getElementById('list-page-size').value
    const token = document.getElementById('list-page-token').value
    let url = `/tasks?pageSize=${size}`
    if (status) url += `&taskStatus=${status}`
    if (token) url += `&pageToken=${token}`

    const r = await request('GET', url, null, 'list-tasks-response')
    if (r.ok && r.data) renderTasksTable(r.data)
  }

  function renderTasksTable(data) {
    const tasks = data.tasks || []
    const tbody = document.getElementById('tasks-tbody')
    tbody.innerHTML = ''

    tasks.forEach(t => {
      const statusKey = t.status ? t.status.replace('TASK_STATUS_', '') : 'TODO'
      const tr = document.createElement('tr')
      tr.innerHTML = `
        <td style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis">${t.id}</td>
        <td>${t.title}</td>
        <td>${t.description || '—'}</td>
        <td><span class="task-status ${statusKey}">${statusKey}</span></td>
        <td>
          <button class="secondary" style="font-size:11px;padding:2px 8px" onclick="fillTaskId('${t.id}')">Select</button>
        </td>
      `
      tbody.appendChild(tr)
    })

    document.getElementById('tasks-table').classList.remove('hidden')
    document.getElementById('next-page-token').textContent = data.nextPageToken || '—'
    if (data.nextPageToken) document.getElementById('list-page-token').value = data.nextPageToken
  }

  function fillTaskId(id) {
    document.getElementById('task-id').value = id
  }

  async function getTask() {
    const id = document.getElementById('task-id').value
    await request('GET', `/tasks/${id}`, null, 'task-response')
  }

  async function updateTask() {
    const id = document.getElementById('task-id').value
    const body = {}
    const title = document.getElementById('update-task-title').value
    const desc = document.getElementById('update-task-desc').value
    const status = document.getElementById('update-task-status').value
    if (title) body.title = title
    if (desc) body.description = desc
    if (status) body.taskStatus = status
    await request('PUT', `/tasks/${id}`, body, 'task-response')
  }

  async function deleteTask() {
    const id = document.getElementById('task-id').value
    await request('DELETE', `/tasks/${id}`, { ids: [id] }, 'task-response')
  }
</script>
</body>
</html>
