syntax = "proto3";

package auth;

import "google/protobuf/empty.proto";

option go_package = "task-tracker/proto/auth";

service AuthService {
  rpc RegisterByEmail(RegisterByEmailRequest) returns (RegisterByEmailResponse);
  rpc LoginByEmail(LoginByEmailRequest) returns (LoginByEmailResponse);
  rpc LoginByOAuth(LoginByOAuthRequest) returns (LoginByOAuthResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc Logout(LogoutRequest) returns (google.protobuf.Empty);
}


message RegisterByEmailRequest {
  string email = 1;
  reserved 2; // remove user_id
  string password = 3;
  string name = 4;
}
message RegisterByEmailResponse {
  string access_token = 1;
  string refresh_token = 2;
}


message LoginByEmailRequest {
  string email = 1;
  string password = 2;
}
message LoginByEmailResponse {
  string access_token = 1;
  string refresh_token = 2;
}


message LoginByOAuthRequest {
  string provider = 1;
  string code = 2;
  string redirect_uri = 3;
}
message LoginByOAuthResponse {
  string access_token = 1;
  string refresh_token = 2;
}


message RefreshTokenRequest {
  string refresh_token = 1;
}
message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
}


message ValidateTokenRequest {
  string access_token = 1;
}
message ValidateTokenResponse {
  string user_id = 1;
}


message LogoutRequest {
  string refresh_token = 1;
}
